<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GExAssist · Home — Variações</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: 'Inter', system-ui, sans-serif; }
  body { background: #f0eee9; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="variations/data.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="variations/home-a-shell.jsx"></script>
<script type="text/babel" src="variations/home-a-chart.jsx"></script>
<script type="text/babel" src="variations/home-a.jsx"></script>
<script type="text/babel" src="variations/cotacao-shared.jsx"></script>
<script type="text/babel" src="variations/cotacao-list.jsx"></script>
<script type="text/babel" src="variations/cotacao-form-a.jsx"></script>
<script type="text/babel" src="variations/cotacao-form-b.jsx"></script>
<script type="text/babel" src="variations/tabela-precos-a.jsx"></script>
<script type="text/babel" src="variations/tabela-precos-b.jsx"></script>
<script type="text/babel" src="variations/agenda-a.jsx"></script>
<script type="text/babel" src="variations/agenda-b.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <DesignCanvas>
      <DCSection id="home" title="01 · Home / Dashboard" subtitle="✓ Soft Pastels">
        <DCArtboard id="home-a" label="Home" width={1440} height={1080}>
          <window.HomeA />
        </DCArtboard>
      </DCSection>

      <DCSection id="cotacao" title="02 · Cotação" subtitle="✓ Form A · Documento">
        <DCArtboard id="cot-list" label="Lista" width={1440} height={1080}>
          <window.CotacaoList />
        </DCArtboard>
        <DCArtboard id="cot-form-a" label="Form · Documento" width={1440} height={1200}>
          <window.CotacaoFormA />
        </DCArtboard>
      </DCSection>

      <DCSection id="tabela" title="03 · Tabela de Preços" subtitle="✓ Documento editorial">
        <DCArtboard id="tab-b" label="Tabela · Documento" width={1440} height={1500}>
          <window.TabelaPrecosB />
        </DCArtboard>
      </DCSection>

      <DCSection id="agenda" title="04 · Agenda" subtitle="Fase 4 — escolha entre calendário mensal clássico ou timeline editorial">
        <DCArtboard id="ag-a" label="A · Mês (calendário tradicional)" width={1440} height={1200}>
          <window.AgendaA />
        </DCArtboard>
        <DCArtboard id="ag-b" label="B · Hoje (timeline editorial)" width={1440} height={1280}>
          <window.AgendaB />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
